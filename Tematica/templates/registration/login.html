{% extends 'Tematica/base.html' %}

{% block body %}
<div class="contenedor">
    <h1>Iniciar sesión</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Ingresar</button>
    </form>

    <p style="text-align:center; margin-top:15px;">
        ¿No tenés cuenta? <a href="{% url 'register' %}">Registrarse</a>
    </p>
</div>
{% endblock %}
