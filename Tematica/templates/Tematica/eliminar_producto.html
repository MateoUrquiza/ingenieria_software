<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eliminar producto</title>
</head>
<body>
    <h1>Eliminar producto</h1>

    <p>¿Seguro que querés eliminar <strong>{{ producto.nombre }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Si, eliminar</button>
    </form>

    <a href="/productos/">Cancelar</a>
</body>
</html>
