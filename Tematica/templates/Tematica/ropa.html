<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sección Hombre | Nova Wear</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f3f3f3;
            color: #1a1a1a;
        }

        header {
            background: #111;
            color: white;
            padding: 20px 50px;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav h1 {
            font-size: 28px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .hero {
            height: 360px;
            background-image: url("https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=1600&q=80");
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-content {
            background: rgba(0, 0, 0, 0.45);
            color: white;
            padding: 30px 40px;
            border-radius: 14px;
            text-align: center;
        }

        .hero-content h2 {
            font-size: 42px;
            margin-bottom: 12px;
        }

        .hero-content p {
            font-size: 18px;
        }

        .productos {
            padding: 60px 40px;
        }

        .productos h3 {
            text-align: center;
            font-size: 38px;
            margin-bottom: 35px;
        }

        .grid-productos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 5px 18px rgba(0,0,0,0.08);
            text-align: center;
            padding-bottom: 20px;
        }

        .card img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            display: block;
        }

        .card h4 {
            font-size: 26px;
            margin-top: 18px;
            margin-bottom: 10px;
        }

        .card p {
            font-size: 21px;
            color: #444;
            margin-bottom: 18px;
        }

        .card a {
            display: inline-block;
            text-decoration: none;
            background: #111;
            color: white;
            padding: 11px 20px;
            border-radius: 10px;
        }

        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 22px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <h1>Nova Wear</h1>
            <ul>
                <li><a href="/">Inicio</a></li>
                <li><a href="/hombre/">Hombre</a></li>

            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h2>Colección Hombre</h2>
            <p>Prendas modernas, urbanas y cómodas para todos los días</p>
        </div>
    </section>

    <section class="productos">
        <h3>Lo más vendido</h3>
        <div class="grid-productos">
            {% for producto in productos %}
                <div class="card">
                    <img src="{{ producto.imagen }}" alt="{{ producto.nombre }}">
                    <h4>{{ producto.nombre }}</h4>
                    <p>{{ producto.precio }}</p>
                    <a href="#">Ver producto</a>
                </div>
            {% endfor %}
        </div>
    </section>

    <footer>
        <p>© 2026 Nova Wear - Sección Hombre</p>
    </footer>

</body>
</html>
