<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Style | Tienda de Ropa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f8f8f8;
            color: #222;
        }

        header {
            background: #111;
            color: white;
            padding: 20px 40px;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav h1 {
            font-size: 28px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .hero {
            background: url("https://images.unsplash.com/photo-1445205170230-053b83016050?q=80&w=1600&auto=format&fit=crop") center/cover;
            height: 420px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        .hero-content {
            background: rgba(0,0,0,0.45);
            padding: 30px;
            border-radius: 12px;
        }

        .hero h2 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            background: #ffffff;
            color: #111;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }

        .productos {
            padding: 50px 40px;
        }

        .productos h3 {
            text-align: center;
            font-size: 32px;
            margin-bottom: 30px;
        }

        .grid-productos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
            text-align: center;
            padding-bottom: 20px;
        }

        .card img {
            width: 100%;
            height: 320px;
            object-fit: cover;
        }

        .card h4 {
            margin: 15px 0 8px;
            font-size: 22px;
        }

        .card p {
            color: #444;
            margin-bottom: 12px;
        }

        .card a {
            text-decoration: none;
            background: #111;
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            display: inline-block;
        }

        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <h1>Urban Style</h1>
            <ul>
                <li><a href="/">Inicio</a></li>
                <li><a href="/ropa">Hombre</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h2>Nueva colección 2026</h2>
            <p>Moda urbana, moderna y al mejor precio</p>
            <a href="#" class="btn">Comprar ahora</a>
        </div>
    </section>

    <section class="productos">
        <h3>Productos destacados</h3>
        <div class="grid-productos">
            {% for producto in productos %}
                <div class="card">
                    <img src="{{ producto.imagen }}" alt="{{ producto.nombre }}">
                    <h4>{{ producto.nombre }}</h4>
                    <p>{{ producto.precio }}</p>
                    <a href="#">Ver producto</a>
                </div>
            {% endfor %}
        </div>
    </section>

    <footer>
        <p>© 2026 Urban Style - Tienda de ropa</p>
    </footer>

</body>
</html>
